<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Register', ~{::section})}">

<section class="auth-wrapper">

<div class="auth-card">

<h2 class="mb-4 text-center">Create Account</h2>

<div th:if="${error}"
     class="alert alert-danger text-center auto-hide">
    <span th:text="${error}"></span>
</div>

<form id="registerForm"
      method="post"
      novalidate
      th:action="@{/register}"
      th:object="${registerRequest}">

<div class="mb-3">
<input type="text" id="name" th:field="*{name}"
       class="form-control" placeholder="Full Name">
<div class="text-danger small error-msg"></div>
</div>

<div class="mb-3">
<input type="email" id="email" th:field="*{email}"
       class="form-control" placeholder="Email">
<div class="text-danger small error-msg"></div>
</div>

<div class="mb-3">
<input type="tel" id="phone" th:field="*{phone}"
       class="form-control" placeholder="Phone">
<div class="text-danger small error-msg"></div>
</div>

<div class="mb-3">
<input type="password" id="password" th:field="*{password}"
       class="form-control" placeholder="Password">
<div class="text-danger small error-msg"></div>
</div>

<div class="mb-3 text-center">

<label class="fw-semibold mb-2 d-block">Register As</label>

<div class="form-check form-check-inline">
<input class="form-check-input"
       type="radio"
       name="role"
       value="BUYER">
<label class="form-check-label">Buyer</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input"
       type="radio"
       name="role"
       value="SELLER">
<label class="form-check-label">Seller</label>
</div>

<div class="text-danger small mt-2 error-msg" id="roleError"></div>

</div>

<button type="submit"
        class="btn btn-warning w-100 fw-semibold">
Register
</button>

</form>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", function(e){

let valid = true;

const name = document.getElementById("name");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const password = document.getElementById("password");
const role = document.querySelector('input[name="role"]:checked');
const roleError = document.getElementById("roleError");

document.querySelectorAll(".error-msg").forEach(el => el.textContent = "");
document.querySelectorAll(".form-control").forEach(el => el.classList.remove("is-invalid"));

const namePattern = /^[A-Za-z ]+$/;

if(name.value.trim()===""){
name.classList.add("is-invalid");
name.nextElementSibling.textContent="Name is required";
valid=false;
}
else if(!namePattern.test(name.value.trim())){
name.classList.add("is-invalid");
name.nextElementSibling.textContent="Name should contain only letters";
valid=false;
}
else if(name.value.trim().length < 3){
name.classList.add("is-invalid");
name.nextElementSibling.textContent="Name must be at least 3 characters";
valid=false;
}

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(email.value.trim()===""){
email.classList.add("is-invalid");
email.nextElementSibling.textContent="Email is required";
valid=false;
}
else if(!emailPattern.test(email.value.trim())){
email.classList.add("is-invalid");
email.nextElementSibling.textContent="Enter a valid email address";
valid=false;
}

const phonePattern = /^[6-9][0-9]{9}$/;

if(phone.value.trim()===""){
phone.classList.add("is-invalid");
phone.nextElementSibling.textContent="Enter a valid Indian mobile number (10 digits starting with 6–9)";
valid=false;
}
else if(!phonePattern.test(phone.value.trim())){
phone.classList.add("is-invalid");
phone.nextElementSibling.textContent="Enter a valid 10-digit phone number";
valid=false;
}

if(password.value.trim()===""){
password.classList.add("is-invalid");
password.nextElementSibling.textContent="Password is required";
valid=false;
}else if(password.value.length<6){
password.classList.add("is-invalid");
password.nextElementSibling.textContent="Password must be at least 6 characters";
valid=false;
}

if(!role){
roleError.textContent="Please select a role";
valid=false;
}

if(!valid){
e.preventDefault();
}

});

</script>

</section>

</html>
