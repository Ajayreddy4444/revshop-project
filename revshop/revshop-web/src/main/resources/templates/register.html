<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Register', ~{::section})}">

<section class="auth-wrapper">

<div class="auth-card">

<h2 class="mb-4 text-center">Create Account</h2>

<form method="post"
      th:action="@{/register}"
      th:object="${registerRequest}"
      novalidate>

<div class="mb-3">
	  <input type="text"
	         th:field="*{name}"
	         class="form-control"
	         placeholder="Full Name"
	         th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">

	  <div class="invalid-feedback d-block error-space">

	  <span th:if="${#fields.hasErrors('name') and #strings.isEmpty(registerRequest.name)}">
	  Please enter your full name
	  </span>

	  <span th:if="${#fields.hasErrors('name') and !#strings.isEmpty(registerRequest.name)}">
	  Name must be at least 3 characters
	  </span>

	  </div>

	  </div>

	  <div class="mb-3">

	  <input type="email"
	         th:field="*{email}"
	         class="form-control"
	         placeholder="Email"
	         th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">

	  <div class="invalid-feedback d-block error-space">

	  <span th:if="${#fields.hasErrors('email') and #strings.isEmpty(registerRequest.email)}">
	  Please enter your email
	  </span>

	  <span th:if="${#fields.hasErrors('email') and !#strings.isEmpty(registerRequest.email)}">
	  Enter a valid email address
	  </span>

	  </div>

	  </div>

	  <div class="mb-3">

	  <input type="text"
	         th:field="*{phone}"
	         class="form-control"
	         placeholder="Phone Number"
	         th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">

	  <div class="invalid-feedback d-block error-space">

	  <span th:if="${#fields.hasErrors('phone') and #strings.isEmpty(registerRequest.phone)}">
	  Please enter your phone number
	  </span>

	  <span th:if="${#fields.hasErrors('phone') and !#strings.isEmpty(registerRequest.phone)}">
	  Phone number must be 10 digits
	  </span>

	  </div>

	  </div>

	  <div class="mb-3">

	  <input type="password"
	         th:field="*{password}"
	         class="form-control"
	         placeholder="Password"
	         th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">

	  <div class="invalid-feedback d-block error-space">

	  <span th:if="${#fields.hasErrors('password') and #strings.isEmpty(registerRequest.password)}">
	  Please enter your password
	  </span>

	  <span th:if="${#fields.hasErrors('password') and !#strings.isEmpty(registerRequest.password)}">
	  Password must be at least 6 characters
	  </span>

	  </div>

	  </div>

<!-- Role -->
<div class="mb-3 text-center">

<label class="fw-semibold mb-2 d-block">Register As</label>

<div class="form-check form-check-inline">
<input class="form-check-input"
       type="radio"
       th:field="*{role}"
       value="BUYER">
<label class="form-check-label">Buyer</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input"
       type="radio"
       th:field="*{role}"
       value="SELLER">
<label class="form-check-label">Seller</label>
</div>

<div class="text-danger mt-2"
     th:if="${#fields.hasErrors('role')}"
     th:text="${#fields.errors('role')[0]}">
</div>

</div>

<button type="submit"
        class="btn btn-warning w-100 fw-semibold">
Register
</button>

</form>

</div>

</section>

</html>
