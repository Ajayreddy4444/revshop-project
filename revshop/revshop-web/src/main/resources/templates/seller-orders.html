<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Seller Orders', ~{::section})}">

	<section class="orders-container">

	    <style>
	        .orders-container {
	            max-width: 1000px;
	            margin: auto;
	            padding: 30px;
	        }

	        .page-title {
	            font-size: 28px;
	            font-weight: 700;
	            margin-bottom: 30px;
	        }

	        .order-card {
	            background: #ffffff;
	            padding: 20px;
	            border-radius: 12px;
	            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
	            margin-bottom: 25px;
	        }

	        .order-header {
	            display: flex;
	            justify-content: space-between;
	            flex-wrap: wrap;
	            border-bottom: 1px solid #eee;
	            padding-bottom: 10px;
	            margin-bottom: 15px;
	        }

	        .status-created { background-color: #6c757d; }
	        .status-paid { background-color: #0d6efd; }
	        .status-shipped { background-color: #fd7e14; }
	        .status-delivered { background-color: #28a745; }
	        .status-cancelled { background-color: #dc3545; }

	        .status-badge {
	            padding: 5px 12px;
	            border-radius: 20px;
	            color: white;
	            font-size: 12px;
	        }

	        .order-body {
	            display: flex;
	            gap: 20px;
	            align-items: center;
	        }

	        .product-img {
	            width: 100px;
	            height: 100px;
	            object-fit: cover;
	            border-radius: 10px;
	        }

	        .details {
	            flex: 1;
	        }

	        .amount {
	            font-weight: 700;
	            font-size: 18px;
	            color: #28a745;
	        }

	        .buyer-box {
	            background: #f8f9fa;
	            padding: 10px;
	            border-radius: 8px;
	            margin-top: 10px;
	        }

	        .empty-orders {
	            text-align: center;
	            padding: 40px;
	            color: gray;
	        }
	    </style>

	    <h2 class="page-title"> Orders Received</h2>

	    <!-- Empty State -->
	    <div th:if="${#lists.isEmpty(orders)}"
	         class="empty-orders">
	        No orders received yet.
	    </div>

	    <div th:each="order : ${orders}" class="order-card">

	        <!-- Header -->
	        <div class="order-header">

	            <div>
	                <strong>Order ID:</strong>
	                <span th:text="${order.orderId}"></span>
	            </div>

	            <div class="amount">
	                ₹ <span th:text="${order.subtotal}"></span>
	            </div>

	            <span class="status-badge"
	                  th:text="${order.status}"
	                  th:classappend="${
	                      order.status == 'CREATED' ? ' status-created' :
	                      order.status == 'PAID' ? ' status-paid' :
	                      order.status == 'SHIPPED' ? ' status-shipped' :
	                      order.status == 'DELIVERED' ? ' status-delivered' :
	                      ' status-cancelled'
	                  }">
	            </span>

	        </div>

	        <!-- Body -->
	        <div class="order-body">

	            <img th:if="${order.imageUrl != null}"
	                 th:src="@{'/images/' + ${order.imageUrl}}"
	                 class="product-img"/>

	            <div class="details">

	                <div class="fw-semibold mb-1"
	                     th:text="${order.productName}"></div>

	                <div>
	                    Qty: <b th:text="${order.quantity}"></b>
	                </div>

	                <div class="buyer-box">
	                    <div class="fw-semibold">Buyer Details</div>
	                    <div th:text="${order.buyerName}"></div>
	                    <div class="text-muted small"
	                         th:text="${order.buyerEmail}"></div>
	                </div>

	                <div class="text-muted small mt-2">
	                    Ordered on:
	                    <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
	                </div>

	            </div>

	        </div>

	    </div>

	</section>
</html>
