<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Login', ~{::section})}">

<section class="auth-wrapper">

<div class="auth-card">

<h2 class="mb-4 text-center">Welcome Back</h2>

<!-- Success Message -->
<div th:if="${success}" 
     class="alert alert-success text-center auto-hide">
<span th:text="${success}"></span>
</div>



<form method="post"
      th:action="@{/login}"
      th:object="${loginRequest}"
      novalidate>

<!-- Email -->
<div class="mb-2">

<input type="email"
       th:field="*{email}"
       class="form-control"
       placeholder="Email address"
       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''">

<div class="invalid-feedback d-block error-space">

<span th:if="${#fields.hasErrors('email') and #strings.isEmpty(loginRequest.email)}">
Please enter your email
</span>

<span th:if="${#fields.hasErrors('email') and !#strings.isEmpty(loginRequest.email)}">
Enter a valid email address
</span>

</div>

</div>

<!-- Password -->
<div class="mb-2">

<input type="password"
       th:field="*{password}"
       class="form-control"
       placeholder="Password"
       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''">

<div class="invalid-feedback d-block error-space">

<span th:if="${#fields.hasErrors('password')}">
Please enter your password
</span>

</div>

</div>

<div class="mb-3 text-end">
<a th:href="@{/forgot-password}"
   class="text-decoration-none">
Forgot Password?
</a>
</div>

<button type="submit"
        class="btn btn-warning w-100 fw-semibold">
Login
</button>

</form>

<div class="mt-4 text-center">
<small>
Don’t have an account?
<a th:href="@{/register}" class="text-warning fw-semibold">
Register
</a>
</small>
</div>

</div>

</section>

<script>
document.addEventListener("DOMContentLoaded", function () {

setTimeout(function () {

document.querySelectorAll('.is-invalid').forEach(function (input) {
input.classList.remove('is-invalid');
});

document.querySelectorAll('.auto-hide').forEach(function (alert) {
alert.remove();
});

}, 2000);

});
</script>

</html>
