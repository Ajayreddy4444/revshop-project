<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Login', ~{::section})}">

<section class="auth-wrapper">

    <div class="auth-card">

        <h2 class="mb-4 text-center">Welcome Back</h2>

        <!-- Success Message -->
        <div th:if="${success}"
             class="alert alert-success text-center auto-hide">
            <span th:text="${success}"></span>
        </div>

        <!-- Backend Error -->
        <div th:if="${error}"
             class="alert alert-danger text-center auto-hide">
            <span th:utext="${error}"></span>
        </div>

        <form id="loginForm"
              method="post"
              novalidate
              th:action="@{/login}"
              th:object="${loginRequest}">

            <!-- Email -->
            <div class="mb-3">
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-control"
                       placeholder="Email address">
                <div class="text-danger small"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       class="form-control"
                       placeholder="Password">
                <div class="text-danger small"></div>
            </div>

            <div class="mb-3 text-end">
                <a th:href="@{/forgot-password}" class="text-decoration-none">
                    Forgot Password?
                </a>
            </div>

            <button type="submit"
                    class="btn btn-warning w-100 fw-semibold">
                Login
            </button>

        </form>

        <div class="mt-4 text-center">
            <small>
                Don’t have an account?
                <a th:href="@{/register}" class="text-warning fw-semibold">
                    Register
                </a>
            </small>
        </div>

    </div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    let valid = true;

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    /* reset errors */
    document.querySelectorAll(".text-danger").forEach(el => el.textContent = "");
    document.querySelectorAll(".form-control").forEach(el => el.classList.remove("is-invalid"));

    /* EMAIL validation */
    if(email.value.trim() === ""){
        email.classList.add("is-invalid");
        email.nextElementSibling.textContent = "Email is required";
        valid = false;
    }
    else if(!email.value.includes("@")){
        email.classList.add("is-invalid");
        email.nextElementSibling.textContent = "Enter valid email";
        valid = false;
    }

    /* PASSWORD validation */
    if(password.value.trim() === ""){
        password.classList.add("is-invalid");
        password.nextElementSibling.textContent = "Password is required";
        valid = false;
    }

    if(!valid){
        e.preventDefault();
    }

});


/* Auto hide alerts */
document.addEventListener("DOMContentLoaded", function () {

    setTimeout(function () {

        document.querySelectorAll('.auto-hide').forEach(function (alert) {
            alert.remove();
        });

    }, 3000);

});

</script>

</section>

</html>
